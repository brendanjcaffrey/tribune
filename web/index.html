<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta
      name="viewport"
      content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no"
    />
    <link
      rel="apple-touch-icon"
      sizes="180x180"
      href="/favicon/apple-touch-icon.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="32x32"
      href="/favicon/favicon-32x32.png"
    />
    <link
      rel="icon"
      type="image/png"
      sizes="16x16"
      href="/favicon/favicon-16x16.png"
    />
    <link rel="manifest" href="/site.webmanifest" />
    <title>Tribune</title>
    <style>
      /* this is a bit hacky, but prevents a flash of white on page load in dark mode */
      html,
      body {
        margin: 0;
        padding: 0;
        background-color: #fff;
        color: #000;
      }

      @media (prefers-color-scheme: dark) {
        html,
        body {
          background-color: #212529;
          color: #fff;
        }
      }
    </style>
    <script>
      // set bootstrap's color mode from the os preference before paint and keep
      // it in sync. bootstrap doesn't follow prefers-color-scheme on its own.
      (function () {
        var mq = window.matchMedia("(prefers-color-scheme: dark)");
        function apply() {
          document.documentElement.setAttribute(
            "data-bs-theme",
            mq.matches ? "dark" : "light",
          );
        }
        apply();
        mq.addEventListener("change", apply);
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
